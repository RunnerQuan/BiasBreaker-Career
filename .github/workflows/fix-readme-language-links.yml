name: Fix README language links

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-links:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip readme links]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update README links on main and deploy
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for branch in main deploy; do
            git fetch origin "$branch"
            git checkout -B "$branch" "origin/$branch"

            python3 - <<'PY'
          from pathlib import Path

          old = '<p align="center">[中文](README.md) · [English](README.en.md)</p>'
          new = '''<p align="center">
            <a href="README.md">中文</a>
            ·
            <a href="README.en.md">English</a>
          </p>'''

          for name in ("README.md", "README.en.md"):
              path = Path(name)
              if not path.exists():
                  continue
              text = path.read_text(encoding="utf-8")
              path.write_text(text.replace(old, new), encoding="utf-8")
          PY

            if ! git diff --quiet -- README.md README.en.md; then
              git add README.md README.en.md
              git commit -m "Fix README language switch links [skip readme links]"
              git push origin "$branch"
            fi
          done
