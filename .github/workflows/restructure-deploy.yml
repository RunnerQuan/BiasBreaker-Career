name: Restructure deploy branch

on:
  push:
    branches: [deploy]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restructure:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip restructure]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: deploy
          fetch-depth: 0

      - name: Move frontend project into frontend directory
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p frontend
          rm -f frontend/README.tmp

          move_if_exists() {
            for path in "$@"; do
              if [ -e "$path" ]; then
                git mv "$path" frontend/
              fi
            done
          }

          move_if_exists app components data lib public workers
          move_if_exists package.json package-lock.json npm-shrinkwrap.json pnpm-lock.yaml yarn.lock
          move_if_exists next.config.js next.config.mjs next.config.ts
          move_if_exists postcss.config.js postcss.config.mjs postcss.config.cjs
          move_if_exists eslint.config.js eslint.config.mjs eslint.config.cjs
          move_if_exists tsconfig.json next-env.d.ts

          # The standalone backend reuses analysis modules from the frontend package.
          sed -i 's#"../lib/#"../frontend/lib/#g' backend/index.ts

          # README files remain at repository root, so image paths must include frontend/.
          for readme in README.md README.en.md; do
            if [ -f "$readme" ]; then
              sed -i 's#src="public/logo.png"#src="frontend/public/logo.png"#g' "$readme"
              sed -i 's#src="./public/logo.png"#src="./frontend/public/logo.png"#g' "$readme"
            fi
          done

          cat > netlify.toml <<'EOF'
          [build]
            base = "frontend"
            command = "npm run build"

          [build.environment]
            NODE_VERSION = "22"
          EOF

          cat > package.json <<'EOF'
          {
            "name": "biasbreaker-career-monorepo",
            "private": true,
            "workspaces": [
              "frontend",
              "backend"
            ],
            "scripts": {
              "frontend:dev": "npm --prefix frontend run dev",
              "frontend:build": "npm --prefix frontend run build",
              "backend:start": "npm --prefix backend start"
            }
          }
          EOF

          git status --short

      - name: Commit restructured layout
        shell: bash
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No restructuring changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Restructure deploy branch into frontend and backend [skip restructure]"
          git push origin deploy
